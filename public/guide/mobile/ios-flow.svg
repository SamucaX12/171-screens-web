    <text x="82" y="267" font-size="11" fill="#e4e4e7">Wi-Fi → proxy + VPN + Perfis de CA</text>

    <line x1="224" y1="278" x2="224" y2="288" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="220,288 224,295 228,288" fill="#3f3f46"/>

    <!-- Step 4 -->
    <rect x="60" y="295" width="320" height="48" rx="10" fill="#0a0a0f" stroke="#3f3f46"/>
    <rect x="60" y="295" width="8" height="48" rx="4" fill="#f59e0b"/>
    <text x="82" y="314" font-size="9" fill="#f59e0b">04 · VERSÃO DO APP</text>
    <text x="82" y="332" font-size="11" fill="#e4e4e7">Free Fire vs App Store + tamanho + IPA</text>

