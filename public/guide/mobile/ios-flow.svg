    <!-- Step 1 -->
    <rect x="60" y="100" width="320" height="48" rx="10" fill="#0a0a0f" stroke="#3f3f46"/>
    <rect x="60" y="100" width="8" height="48" rx="4" fill="#a1a1aa"/>
    <text x="82" y="119" font-size="9" fill="#a1a1aa">01 · TELA INICIAL</text>
