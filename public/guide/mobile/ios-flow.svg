  <text x="592" y="266" font-family="monospace" font-size="9" fill="#fcd34d" text-anchor="middle">• 1-2 indicadores ambíguos</text>
  <text x="592" y="281" font-family="monospace" font-size="9" fill="#fcd34d" text-anchor="middle">• Evasão parcial · app apagado</text>

  <rect x="445" y="308" width="295" height="80" rx="8" fill="#1c0505" stroke="#7f1d1d"/>
  <text x="592" y="330" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">✗ BANIMENTO</text>
  <text x="592" y="350" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">• Cydia/Sileo/Filza encontrado</text>
  <text x="592" y="366" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">• Brevet/iGameGod ativo</text>
  <text x="592" y="382" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">• Proxy ativo no horário da partida</text>
