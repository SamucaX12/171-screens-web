    <!-- Step 5 -->
    <rect x="60" y="360" width="320" height="48" rx="10" fill="#0a0a0f" stroke="#3f3f46"/>
    <rect x="60" y="360" width="8" height="48" rx="4" fill="#a78bfa"/>
    <text x="82" y="379" font-size="9" fill="#a78bfa">05 · BATERIA / LOGS</text>
    <text x="82" y="397" font-size="11" fill="#e4e4e7">Últimas 24h → apps suspeitos no horário</text>
