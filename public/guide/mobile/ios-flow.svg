  <rect x="430" y="100" width="320" height="308" rx="16" fill="#0a0a0f" stroke="#3f3f46"/>
  <text x="590" y="125" font-family="monospace" font-size="12" fill="#a1a1aa" text-anchor="middle" font-weight="bold">VEREDITO</text>
  <rect x="440" y="133" width="300" height="1" fill="#3f3f46"/>

  <rect x="445" y="148" width="295" height="68" rx="8" fill="#052e16" stroke="#166534"/>
  <text x="592" y="168" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">✓ LIMPO</text>
  <text x="592" y="186" font-family="monospace" font-size="9" fill="#86efac" text-anchor="middle">• Sem jailbreak apps</text>
