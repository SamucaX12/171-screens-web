  <rect x="60" y="204" width="200" height="26" rx="6" fill="#1c0505" stroke="#7f1d1d"/>
  <text x="160" y="221" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">Cydia / Sileo = Root ativo</text>

