  <rect x="545" y="246" width="180" height="24" rx="6" fill="#18181b" stroke="#52525b"/>
  <text x="558" y="262" font-family="monospace" font-size="10" fill="#a1a1aa">🔍 Cydia</text>

  <!-- VPN/Device Management -->
  <rect x="530" y="295" width="210" height="60" rx="10" fill="#0a0a0f" stroke="#3f3f46"/>
  <text x="545" y="313" font-family="monospace" font-size="9" fill="#71717a">Ajustes → Geral →</text>
  <text x="545" y="328" font-family="monospace" font-size="9" fill="#71717a">VPN e Gerenc. Dispositivo</text>
  <text x="545" y="344" font-family="monospace" font-size="10" fill="#f59e0b">Perfis suspeitos = flag</text>

  <!-- Footer verdict bar -->
  <rect x="60" y="400" width="680" height="30" rx="8" fill="#0a0a0f" stroke="#166534"/>
  <text x="400" y="420" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">LIMPO: sem Cydia/Sileo/Filza · SUSPEITO: evasão · BAN: app encontrado + tweak ativo</text>
