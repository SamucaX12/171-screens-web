<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#050508"/>
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#34d399" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#g)" opacity="0.1"/>

  <text x="400" y="45" font-family="monospace" font-size="11" fill="#a1a1aa" text-anchor="middle">// Android · Categoria: SISTEMA</text>
