  <rect x="60" y="385" width="680" height="30" rx="8" fill="#0a0a0f" stroke="#166534"/>
  <text x="400" y="405" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">LIMPO: sem root + APK oficial · SUSPEITO: root + DenyList · BAN: GG + módulo ativo</text>
